<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>这就是爱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
        }
        
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 24px;
        }
        
        .slide.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* 背景照片层 */
        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            filter: blur(2px) brightness(0.7);
            transition: all 1.5s ease;
            z-index: -1;
        }
        
        .slide.active::before {
            opacity: 0.35;
            transform: scale(1.05);
        }
        
        #slide1::before {
            background-image: url('photo-hiking.jpg');
            background-color: #1a1a2e;
        }
        
        #slide2::before {
            background-image: url('photo-concert.jpg');
            background-color: #16213e;
        }
        
        #slide3::before {
            background-image: url('photo-skiing.jpg');
            background-color: #0f3460;
        }
        
        /* 渐变遮罩 */
        .slide::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.4) 0%,
                rgba(0,0,0,0.1) 30%,
                rgba(0,0,0,0.1) 70%,
                rgba(0,0,0,0.6) 100%
            );
            z-index: -1;
        }
        
        /* 内容动画 */
        .content {
            text-align: center;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
        }
        
        .slide.active .content {
            transform: translateY(0);
            opacity: 1;
        }
        
        .year {
            font-size: 14px;
            letter-spacing: 8px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
            font-weight: 300;
        }
        
        .title {
            font-size: 56px;
            font-weight: 200;
            margin-bottom: 24px;
            letter-spacing: 16px;
            text-indent: 16px;
            background: linear-gradient(135deg, #fff 0%, #ffd700 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        .desc {
            font-size: 18px;
            line-height: 2;
            color: rgba(255,255,255,0.85);
            max-width: 300px;
        }
        
        .desc .highlight {
            color: #ffd700;
            font-weight: 500;
        }
        
        /* 进度指示器 */
        .progress {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.4s ease;
        }
        
        .dot.active {
            background: #ffd700;
            width: 24px;
            border-radius: 4px;
        }
        
        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            animation: fadeInOut 2s infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        /* 求婚页特殊样式 */
        #proposal {
            background: radial-gradient(ellipse at center, #1a0a2e 0%, #000 100%);
        }
        
        #proposal::before {
            display: none;
        }
        
        .proposal-content {
            position: relative;
            z-index: 10;
        }
        
        .hearts-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        
        .heart-float {
            position: absolute;
            font-size: 24px;
            animation: floatUp 6s infinite;
            opacity: 0;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        
        .ring {
            font-size: 100px;
            margin-bottom: 30px;
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.15); }
            28% { transform: scale(1); }
            42% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }
        
        .song-title {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 6px;
            margin-bottom: 20px;
        }
        
        .proposal-text {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.8;
            margin-bottom: 40px;
            text-shadow: 0 0 40px rgba(255,215,0,0.3);
        }
        
        .proposal-text .line {
            display: block;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s forwards;
        }
        
        .proposal-text .line:nth-child(1) { animation-delay: 0.2s; }
        .proposal-text .line:nth-child(2) { animation-delay: 0.6s; }
        .proposal-text .line:nth-child(3) { animation-delay: 1s; }
        .proposal-text .line:nth-child(4) { animation-delay: 1.4s; }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .names {
            font-size: 20px;
            color: #ffd700;
            letter-spacing: 8px;
            font-weight: 300;
        }
        
        .names span {
            margin: 0 12px;
        }
        
        /* 闪光效果 */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkle 2s infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- 回忆幻灯片 1: 爬山 -->
    <div class="slide active" id="slide1">
        <div class="content">
            <div class="year">2022</div>
            <div class="title">山</div>
            <div class="desc">
                我们在爬山时相识<br>
                <span class="highlight">张立伟 · 和晨睿</span>
            </div>
        </div>
    </div>
    
    <!-- 回忆幻灯片 2: 演唱会 -->
    <div class="slide" id="slide2">
        <div class="content">
            <div class="year">第一次</div>
            <div class="title">星</div>
            <div class="desc">
                你带我看第一场<span class="highlight">张杰</span><br>
                我的第一次演唱会
            </div>
        </div>
    </div>
    
    <!-- 回忆幻灯片 3: 滑雪 -->
    <div class="slide" id="slide3">
        <div class="content">
            <div class="year">每一周</div>
            <div class="title">雪</div>
            <div class="desc">
                你怕滑雪，却每周陪我去<br>
                最后，你也学会了
            </div>
        </div>
    </div>
    
    <!-- 求婚页 -->
    <div class="slide" id="proposal">
        <div class="hearts-bg" id="heartsContainer"></div>
        <div class="proposal-content">
            <div class="song-title">♪ 《这就是爱》 ♪</div>
            <div class="ring">💍</div>
            <div class="proposal-text">
                <span class="line">山爬过了</span>
                <span class="line">雪滑过了</span>
                <span class="line">歌也听过了</span>
                <span class="line">但我不想停</span>
            </div>
            <div class="names">
                <span>和晨睿</span>
                ♡
                <span>嫁给我</span>
            </div>
        </div>
    </div>
    
    <!-- 进度点 -->
    <div class="progress">
        <div class="dot active" data-slide="0"></div>
        <div class="dot" data-slide="1"></div>
        <div class="dot" data-slide="2"></div>
        <div class="dot" data-slide="3"></div>
    </div>
    
    <div class="hint">点击或滑动继续</div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const hint = document.querySelector('.hint');
        let currentSlide = 0;
        let autoPlayTimer = null;
        
        // 生成飘落的心
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const hearts = ['💙', '🤍', '✨', '💫'];
            
            setInterval(() => {
                if (currentSlide !== 3) return;
                
                const heart = document.createElement('span');
                heart.className = 'heart-float';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (4 + Math.random() * 4) + 's';
                heart.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 8000);
            }, 300);
        }
        
        // 切换幻灯片
        function goToSlide(index) {
            if (index < 0 || index >= slides.length) return;
            
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            
            currentSlide = index;
            
            // 最后一页隐藏提示
            if (index === 3) {
                hint.style.display = 'none';
            } else {
                hint.style.display = 'block';
            }
            
            // 重置自动播放
            clearTimeout(autoPlayTimer);
            if (index < 3) {
                autoPlayTimer = setTimeout(() => {
                    goToSlide(index + 1);
                }, 4000);
            }
        }
        
        // 点击切换
        document.addEventListener('click', () => {
            if (currentSlide < 3) {
                goToSlide(currentSlide + 1);
            }
        });
        
        // 滑动切换
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});
        
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});
        
        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentSlide < 3) {
                    goToSlide(currentSlide + 1);
                } else if (diff < 0 && currentSlide > 0) {
                    goToSlide(currentSlide - 1);
                }
            }
        }
        
        // 初始化
        createHearts();
        autoPlayTimer = setTimeout(() => goToSlide(1), 4000);
    </script>
</body>
</html>
