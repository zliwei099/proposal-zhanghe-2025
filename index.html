<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>这就是爱 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --dark: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.1);
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--dark);
        }
        
        /* 加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        
        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loader-heart {
            font-size: 60px;
            animation: loaderPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes loaderPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        
        .loader-text {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
        }
        
        /* 页面容器 */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .page.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        /* 背景图 - Ken Burns 效果 */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.7) saturate(1.1);
            transform: scale(1.15);
            transition: transform 10s ease-out;
        }
        
        .page.active .bg-image {
            transform: scale(1);
        }
        
        #p1 .bg-image { background-image: url('photo-hiking.jpg'); }
        #p2 .bg-image { background-image: url('photo-concert.jpg'); }
        #p3 .bg-image { background-image: url('photo-skiing.jpg'); }
        
        /* 渐变遮罩 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to top,
                rgba(10, 10, 15, 0.98) 0%,
                rgba(10, 10, 15, 0.7) 30%,
                rgba(10, 10, 15, 0.3) 60%,
                rgba(10, 10, 15, 0.5) 100%
            );
        }
        
        /* 内容区域 */
        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 60px 32px 100px;
            z-index: 10;
        }
        
        /* 时间线标签 */
        .timeline-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--gold);
            margin-bottom: 20px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.6s ease 0.3s;
        }
        
        .page.active .timeline-badge {
            opacity: 1;
            transform: translateX(0);
        }
        
        .timeline-dot {
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gold);
        }
        
        /* 大标题 - 打字机效果 */
        .title {
            font-size: 80px;
            font-weight: 100;
            letter-spacing: 20px;
            color: #fff;
            margin-bottom: 24px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        
        .title-text {
            display: inline-block;
            opacity: 0;
            transform: translateY(100%);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s;
        }
        
        .page.active .title-text {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 描述卡片 - 高级玻璃拟态 */
        .desc-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 28px 32px;
            max-width: 360px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease 0.7s;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .page.active .desc-card {
            opacity: 1;
            transform: translateY(0);
        }
        
        .desc-text {
            font-size: 17px;
            line-height: 2;
            color: rgba(255, 255, 255, 0.92);
        }
        
        .desc-text .highlight {
            color: var(--gold-light);
            font-weight: 600;
        }
        
        /* 装饰线条 - 流动效果 */
        .divider-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light), transparent);
            margin: 24px 0;
            opacity: 0;
            transform: scaleX(0);
            transform-origin: left;
            transition: all 0.8s ease 0.6s;
            position: relative;
            overflow: hidden;
        }
        
        .divider-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            100% { left: 100%; }
        }
        
        .page.active .divider-line {
            opacity: 1;
            transform: scaleX(1);
        }
        
        /* 页码指示器 */
        .page-indicator {
            position: fixed;
            top: 50%;
            right: 24px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .indicator {
            width: 4px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        
        .indicator:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        
        .indicator.active {
            height: 48px;
            background: linear-gradient(to bottom, var(--gold), var(--gold-light));
            box-shadow: 0 0 15px var(--gold);
        }
        
        /* 音乐控制 */
        .music-control {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
        }
        
        .music-control.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .music-control:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--gold);
            transform: scale(1.1);
        }
        
        .music-control.playing {
            animation: musicPulse 2s ease-in-out infinite;
        }
        
        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
        }
        
        .music-icon {
            font-size: 20px;
            transition: transform 0.3s ease;
        }
        
        .music-control.playing .music-icon {
            animation: musicWave 1s ease-in-out infinite;
        }
        
        @keyframes musicWave {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 3px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .hint.visible {
            opacity: 1;
        }
        
        .hint-arrow {
            animation: bounce 1.5s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }
        
        /* ===== 封面页 ===== */
        #cover {
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #000 70%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
        }
        
        .cover-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .cover-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            animation: shoot 3s linear infinite;
            opacity: 0;
        }
        
        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(100vw) translateY(100px); opacity: 0; }
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        
        .cover-content {
            position: relative;
            z-index: 10;
        }
        
        .cover-year {
            font-size: 14px;
            letter-spacing: 10px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 1s ease 0.3s forwards;
        }
        
        .cover-names {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 6px;
            color: #fff;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 1s ease 0.6s forwards;
        }
        
        .cover-names span {
            color: var(--gold);
            font-weight: 500;
        }
        
        .cover-line {
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 50px;
            opacity: 0;
            animation: fadeIn 1s ease 0.9s forwards;
        }
        
        .cover-title {
            font-size: 56px;
            font-weight: 100;
            letter-spacing: 16px;
            color: #fff;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeInUp 1s ease 1.2s forwards;
        }
        
        .cover-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 20px 56px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 4px;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeInScale 0.8s ease 1.8s forwards;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }
        
        .cover-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.5);
        }
        
        .cover-btn svg {
            width: 20px;
            height: 20px;
            animation: bounceArrow 2s infinite;
        }
        
        @keyframes bounceArrow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* ===== 求婚词页 ===== */
        #proposal {
            background: radial-gradient(ellipse at center bottom, #1a0a2e 0%, #000 70%);
        }
        
        .proposal-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            position: relative;
        }
        
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            font-size: 16px;
            opacity: 0;
            animation: floatParticle 6s infinite;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        
        .song-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
            margin-bottom: 40px;
            padding: 12px 24px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeInScale 0.8s ease 0.2s forwards;
        }
        
        .song-badge::before, .song-badge::after {
            content: '♪';
            color: var(--gold);
        }
        
        .ring-wrapper {
            position: relative;
            margin-bottom: 50px;
        }
        
        .ring {
            font-size: 100px;
            display: inline-block;
            animation: heartbeat 1.8s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.5));
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.12); }
            30% { transform: scale(1); }
            45% { transform: scale(1.12); }
            60% { transform: scale(1); }
        }
        
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulseGlow 2s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }
        
        .proposal-text {
            font-size: 32px;
            font-weight: 300;
            line-height: 2.4;
            color: #fff;
            margin-bottom: 50px;
        }
        
        .proposal-text .line {
            display: block;
            opacity: 0;
            transform: translateY(30px);
        }
        
        .proposal-text .line:nth-child(1) { animation: fadeUp 0.8s ease 0.6s forwards; }
        .proposal-text .line:nth-child(2) { animation: fadeUp 0.8s ease 1s forwards; }
        .proposal-text .line:nth-child(3) { animation: fadeUp 0.8s ease 1.4s forwards; }
        .proposal-text .line:nth-child(4) { 
            animation: fadeUp 0.8s ease 1.8s forwards;
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 10px;
        }
        
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .continue-btn {
            margin-top: 20px;
            padding: 18px 50px;
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 50px;
            color: var(--gold);
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease 2.5s forwards;
            position: relative;
            overflow: hidden;
        }
        
        .continue-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .continue-btn:hover::before {
            left: 100%;
        }
        
        .continue-btn:hover {
            background: var(--gold);
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }
        
        /* ===== 提问页 ===== */
        #question {
            background: radial-gradient(ellipse at center, #1a0a2e 0%, #000 70%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
        }
        
        .question-content {
            position: relative;
            z-index: 10;
        }
        
        .question-ring {
            font-size: 90px;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 50px rgba(212, 175, 55, 0.6));
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        
        .question-text {
            font-size: 36px;
            font-weight: 300;
            color: #fff;
            margin-bottom: 60px;
            line-height: 1.8;
            opacity: 0;
            animation: fadeIn 1s ease 0.3s forwards;
        }
        
        .question-text .name {
            color: var(--gold);
            font-weight: 600;
            font-size: 42px;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.8s forwards;
        }
        
        .btn-yes {
            padding: 24px 70px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.5);
        }
        
        .btn-yes:active {
            transform: scale(0.95);
        }
        
        .btn-no {
            padding: 14px 40px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-no:hover {
            border-color: #e74c3c;
            color: #e74c3c;
            transform: translateX(5px);
        }
        
        /* ===== 庆祝页 ===== */
        #celebration {
            background: radial-gradient(ellipse at center, #2d1b4e 0%, #0a0a1a 50%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            overflow: hidden;
        }
        
        .celebration-content {
            position: relative;
            z-index: 10;
        }
        
        .big-heart {
            font-size: 140px;
            margin-bottom: 30px;
            animation: heartbeat 0.8s ease-in-out infinite;
            filter: drop-shadow(0 0 60px rgba(231, 76, 60, 0.6));
        }
        
        .celebration-title {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInScale 0.8s ease 0.3s forwards;
        }
        
        .celebration-subtitle {
            font-size: 20px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeIn 1s ease 0.8s forwards;
        }
        
        .celebration-names {
            margin-top: 50px;
            font-size: 28px;
            color: var(--gold);
            letter-spacing: 8px;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 1s ease 1.2s forwards;
        }
        
        /* 彩带特效 */
        .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall 4s ease-out forwards;
        }
        
        @keyframes confetti-fall {
            0% {
                transform: translateY(-100px) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }
        
        /* 烟花特效 */
        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: firework-explode 1.5s ease-out forwards;
        }
        
        @keyframes firework-explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }
        
        /* 爱心雨 */
        .heart-rain {
            position: absolute;
            font-size: 28px;
            animation: heart-fall 3s ease-out forwards;
            opacity: 0.9;
        }
        
        @keyframes heart-fall {
            0% {
                transform: translateY(-50px) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg) scale(0.8);
                opacity: 0;
            }
        }
        
        /* 金色粒子 */
        .gold-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gold);
            animation: gold-float 4s ease-out forwards;
        }
        
        @keyframes gold-float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) scale(0.5);
                opacity: 0;
            }
        }
        
        @media (max-height: 700px) {
            .title { font-size: 64px; letter-spacing: 12px; }
            .ring { font-size: 80px; }
            .proposal-text { font-size: 28px; }
            .proposal-text .line:nth-child(4) { font-size: 36px; }
            .question-text { font-size: 30px; }
            .question-text .name { font-size: 36px; }
            .celebration-title { font-size: 44px; }
            .big-heart { font-size: 100px; }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loader" id="loader">
        <div class="loader-heart">💍</div>
        <div class="loader-text">加载中...</div>
    </div>

    <!-- 音乐控制 -->
    <div class="music-control" id="musicControl" onclick="toggleMusic()">
        <span class="music-icon" id="musicIcon">🎵</span>
    </div>

    <!-- 第0页：封面 -->
    <div class="page active" id="cover">
        <div class="cover-stars" id="coverStars"></div>
        
        <div class="cover-content">
            <div class="cover-year">2024 — 2026</div>
            <div class="cover-names"><span>张立伟</span> · <span>和晨睿</span></div>
            <div class="cover-line"></div>
            <div class="cover-title">我们的故事</div>
            
            <button class="cover-btn" onclick="startStory()">
                开始
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12l7 7 7-7"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- 第1页：山 -->
    <div class="page" id="p1">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <div class="timeline-badge">
                <div class="timeline-dot"></div>
                <span>2024 · 相识</span>
            </div>
            
            <h1 class="title"><span class="title-text">山</span></h1>
            
            <div class="divider-line"></div>
            
            <div class="desc-card">
                <p class="desc-text">
                    我们在<span class="highlight">爬山</span>时相识<br>
                    <span class="highlight">张立伟</span> 与 <span class="highlight">和晨睿</span><br>
                    两年，一起爬过很多座山
                </p>
            </div>
        </div>
    </div>

    <!-- 第2页：星 -->
    <div class="page" id="p2">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <div class="timeline-badge">
                <div class="timeline-dot"></div>
                <span>第一次演唱会</span>
            </div>
            
            <h1 class="title"><span class="title-text">星</span></h1>
            
            <div class="divider-line"></div>
            
            <div class="desc-card">
                <p class="desc-text">
                    你带我看第一场<span class="highlight">张杰</span><br>
                    我的第一次演唱会<br>
                    从此，音乐成为我们的一部分
                </p>
            </div>
        </div>
    </div>

    <!-- 第3页：雪 -->
    <div class="page" id="p3">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <div class="timeline-badge">
                <div class="timeline-dot"></div>
                <span>每一周 · 陪伴</span>
            </div>
            
            <h1 class="title"><span class="title-text">雪</span></h1>
            
            <div class="divider-line"></div>
            
            <div class="desc-card">
                <p class="desc-text">
                    你怕<span class="highlight">滑雪</span>，却每周陪我去<br>
                    从害怕到学会<br>
                    这就是陪伴的力量
                </p>
            </div>
        </div>
    </div>

    <!-- 第4页：求婚词 -->
    <div class="page" id="proposal">
        <div class="stars" id="stars"></div>
        <div class="particles" id="particles"></div>
        
        <div class="proposal-content">
            <div class="song-badge">《这就是爱》</div>
            
            <div class="ring-wrapper">
                <div class="glow"></div>
                <div class="ring">💍</div>
            </div>
            
            <div class="proposal-text">
                <span class="line">山爬过了</span>
                <span class="line">雪滑过了</span>
                <span class="line">歌也听过了</span>
                <span class="line">但我不想停</span>
            </div>
            
            <button class="continue-btn" onclick="goToPage(5)">
                继续 →
            </button>
        </div>
    </div>

    <!-- 第5页：提问 -->
    <div class="page" id="question">
        <div class="stars" id="questionStars"></div>
        
        <div class="question-content">
            <div class="question-ring">💍</div>
            
            <div class="question-text">
                <span class="name">和晨睿</span><br>
                你愿意嫁给我吗？
            </div>
            
            <div class="buttons">
                <button class="btn-yes" onclick="sayYes()">我愿意 ♥</button>
                <button class="btn-no" onclick="sayNo()">再考虑一下</button>
            </div>
        </div>
    </div>

    <!-- 第6页：庆祝 -->
    <div class="page" id="celebration">
        <div class="confetti-container" id="confetti"></div>
        
        <div class="celebration-content">
            <div class="big-heart">❤️</div>
            
            <div class="celebration-title">她答应了！</div>
            
            <div class="celebration-subtitle">恭喜你们，开启人生新篇章</div>
            
            <div class="celebration-names">张立伟 ♥ 和晨睿</div>
        </div>
    </div>

    <!-- 页码指示器 -->
    <div class="page-indicator" id="indicator">
        <div class="indicator active" data-page="0"></div>
        <div class="indicator" data-page="1"></div>
        <div class="indicator" data-page="2"></div>
        <div class="indicator" data-page="3"></div>
        <div class="indicator" data-page="4"></div>
        <div class="indicator" data-page="5"></div>
        <div class="indicator" data-page="6"></div>
    </div>

    <div class="hint" id="hint">
        点击或滑动继续 <span class="hint-arrow">↓</span>
    </div>

    <script>
        // 音频对象（示例，实际使用时替换为真实的音频URL）
        let audio = null;
        let isPlaying = false;
        
        const pages = document.querySelectorAll('.page');
        const indicators = document.querySelectorAll('.indicator');
        const hint = document.getElementById('hint');
        const indicatorContainer = document.getElementById('indicator');
        const musicControl = document.getElementById('musicControl');
        let currentPage = 0;
        let autoTimer = null;
        let storyStarted = false;

        // 页面加载完成后隐藏加载动画
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1500);
        });

        // 音乐控制
        function toggleMusic() {
            if (!audio) {
                // 这里可以替换为真实的音频URL
                // audio = new Audio('https://example.com/music.mp3');
                // audio.loop = true;
                alert('🎵 提示：可以在这里添加《这就是爱》背景音乐');
                return;
            }
            
            if (isPlaying) {
                audio.pause();
                musicControl.classList.remove('playing');
                document.getElementById('musicIcon').textContent = '🔇';
            } else {
                audio.play();
                musicControl.classList.add('playing');
                document.getElementById('musicIcon').textContent = '🎵';
            }
            isPlaying = !isPlaying;
        }

        // 生成封面星星和流星
        function createCoverStars() {
            const container = document.getElementById('coverStars');
            
            // 普通星星
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'cover-star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.width = Math.random() > 0.8 ? '3px' : '2px';
                star.style.height = star.style.width;
                container.appendChild(star);
            }
            
            // 流星
            for (let i = 0; i < 3; i++) {
                const shooting = document.createElement('div');
                shooting.className = 'shooting-star';
                shooting.style.top = Math.random() * 50 + '%';
                shooting.style.left = Math.random() * 50 + '%';
                shooting.style.animationDelay = i * 2 + 's';
                container.appendChild(shooting);
            }
        }

        // 生成星星
        function createStars() {
            const containers = ['stars', 'questionStars'];
            containers.forEach(id => {
                const container = document.getElementById(id);
                if (!container) return;
                for (let i = 0; i < 60; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 60 + '%';
                    star.style.animationDelay = Math.random() * 3 + 's';
                    container.appendChild(star);
                }
            });
        }

        // 生成漂浮粒子
        function createParticles() {
            const container = document.getElementById('particles');
            const particles = ['✨', '💫', '⭐', '🌟', '💛'];
            
            setInterval(() => {
                if (currentPage !== 4) return;
                
                const p = document.createElement('span');
                p.className = 'particle';
                p.textContent = particles[Math.floor(Math.random() * particles.length)];
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (5 + Math.random() * 4) + 's';
                p.style.fontSize = (14 + Math.random() * 10) + 'px';
                container.appendChild(p);
                
                setTimeout(() => p.remove(), 9000);
            }, 300);
        }

        // 开始故事
        function startStory() {
            storyStarted = true;
            indicatorContainer.style.opacity = '1';
            musicControl.classList.add('visible');
            hint.classList.add('visible');
            goToPage(1);
        }

        // 切换页面
        function goToPage(index) {
            if (index < 0 || index >= pages.length) return;
            
            pages.forEach((page, i) => {
                page.classList.toggle('active', i === index);
            });
            
            indicators.forEach((ind, i) => {
                ind.classList.toggle('active', i === index);
            });
            
            currentPage = index;
            
            // 更新提示
            if (index === 0 || index === 5 || index === 6) {
                hint.classList.remove('visible');
            } else {
                hint.classList.add('visible');
            }
            
            if (index === 0 || index === 6) {
                indicatorContainer.style.opacity = '0';
            } else {
                indicatorContainer.style.opacity = '1';
            }
            
            // 自动播放
            clearTimeout(autoTimer);
            if (index >= 1 && index <= 3) {
                autoTimer = setTimeout(() => goToPage(index + 1), 5000);
            }
            
            // 触发庆祝特效
            if (index === 6) {
                setTimeout(startCelebration, 500);
            }
        }

        // 点击切换
        document.addEventListener('click', (e) => {
            if (!storyStarted) return;
            if (currentPage === 4 || currentPage === 5 || currentPage === 6) return;
            if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
            if (currentPage < 4) goToPage(currentPage + 1);
        });

        // 滑动切换
        let touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            if (!storyStarted || currentPage === 4 || currentPage === 5 || currentPage === 6) return;
            const diff = touchStartY - e.changedTouches[0].screenY;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentPage < 4) goToPage(currentPage + 1);
                else if (diff < 0 && currentPage > 1) goToPage(currentPage - 1);
            }
        }, {passive: true});

        // 指示器点击
        indicators.forEach((ind, i) => {
            ind.addEventListener('click', () => {
                if (!storyStarted || i > 4) return;
                goToPage(i);
            });
        });

        // 愿意！
        function sayYes() {
            goToPage(6);
        }

        // 再考虑一下
        function sayNo() {
            const btn = document.querySelector('.btn-no');
            const texts = ['只能选愿意哦 😊', '别再犹豫了 💍', '快说愿意！❤️'];
            const randomText = texts[Math.floor(Math.random() * texts.length)];
            
            btn.textContent = randomText;
            btn.style.borderColor = '#d4af37';
            btn.style.color = '#d4af37';
            btn.style.transform = 'translateX(10px)';
            
            setTimeout(() => {
                btn.textContent = '再考虑一下';
                btn.style.borderColor = 'rgba(255,255,255,0.3)';
                btn.style.color = 'rgba(255,255,255,0.5)';
                btn.style.transform = 'translateX(0)';
            }, 2000);
        }

        // 庆祝特效
        function startCelebration() {
            const container = document.getElementById('confetti');
            const colors = ['#d4af37', '#f4d03f', '#e74c3c', '#3498db', '#fff', '#ff6b9d', '#9b59b6'];
            
            // 彩带
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    confetti.style.width = Math.random() > 0.5 ? '12px' : '8px';
                    confetti.style.height = confetti.style.width;
                    container.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4500);
                }, i * 20);
            }
            
            // 爱心雨
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-rain';
                    heart.textContent = ['❤️', '💖', '💕', '💗', '💝', '💓'][Math.floor(Math.random() * 6)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 0.5 + 's';
                    heart.style.fontSize = (20 + Math.random() * 15) + 'px';
                    container.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 3500);
                }, i * 80 + 300);
            }
            
            // 金色粒子
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'gold-particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 0.5 + 's';
                    container.appendChild(particle);
                    
                    setTimeout(() => particle.remove(), 4500);
                }, i * 100 + 500);
            }
            
            // 烟花
            for (let i = 0; i < 8; i++) {
                setTimeout(() => createFirework(), i * 250 + 800);
            }
        }

        // 烟花
        function createFirework() {
            const container = document.getElementById('confetti');
            const x = 15 + Math.random() * 70;
            const y = 20 + Math.random() * 40;
            const colors = ['#d4af37', '#ff6b9d', '#3498db', '#e74c3c', '#9b59b6', '#fff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework';
                particle.style.left = x + '%';
                particle.style.top = y + '%';
                particle.style.background = color;
                const angle = (i / 25) * Math.PI * 2;
                const distance = 80 + Math.random() * 80;
                particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                container.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1500);
            }
        }

        // 初始化
        createCoverStars();
        createStars();
        createParticles();
    </script>
</body>
</html>
