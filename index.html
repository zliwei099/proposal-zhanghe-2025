<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>这就是爱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --dark: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.08);
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--dark);
        }
        
        /* 页面容器 */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        
        .page.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* 背景图 - 更高清 */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.75);
            transform: scale(1.1);
            transition: transform 8s ease-out, filter 0.5s ease;
        }
        
        .page.active .bg-image {
            transform: scale(1);
        }
        
        #p1 .bg-image { background-image: url('photo-hiking.jpg'); }
        #p2 .bg-image { background-image: url('photo-concert.jpg'); }
        #p3 .bg-image { background-image: url('photo-skiing.jpg'); }
        
        /* 渐变遮罩 - 从下往上 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to top,
                rgba(10, 10, 15, 0.95) 0%,
                rgba(10, 10, 15, 0.6) 40%,
                rgba(10, 10, 15, 0.2) 70%,
                rgba(10, 10, 15, 0.4) 100%
            );
        }
        
        /* 内容区域 */
        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 60px 32px 80px;
            z-index: 10;
        }
        
        /* 年份标签 */
        .year-tag {
            display: inline-block;
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease 0.2s;
        }
        
        .page.active .year-tag {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 大标题 */
        .title {
            font-size: 72px;
            font-weight: 100;
            letter-spacing: 24px;
            color: #fff;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease 0.3s;
            text-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        
        .page.active .title {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 描述卡片 - 毛玻璃效果 */
        .desc-card {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px 28px;
            max-width: 340px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease 0.5s;
        }
        
        .page.active .desc-card {
            opacity: 1;
            transform: translateY(0);
        }
        
        .desc-text {
            font-size: 16px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .desc-text .highlight {
            color: var(--gold-light);
            font-weight: 500;
        }
        
        /* 装饰线条 */
        .divider-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), transparent);
            margin: 20px 0;
            opacity: 0;
            transform: scaleX(0);
            transform-origin: left;
            transition: all 0.6s ease 0.4s;
        }
        
        .page.active .divider-line {
            opacity: 1;
            transform: scaleX(1);
        }
        
        /* 页码指示 */
        .page-indicator {
            position: absolute;
            top: 50%;
            right: 24px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 100;
        }
        
        .indicator {
            width: 3px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            transition: all 0.4s ease;
        }
        
        .indicator.active {
            height: 40px;
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }
        
        /* 提示文字 */
        .hint {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            z-index: 100;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        /* ===== 求婚页特殊样式 ===== */
        #proposal {
            background: radial-gradient(ellipse at center bottom, #1a0a2e 0%, #000 70%);
        }
        
        .proposal-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            position: relative;
        }
        
        /* 星空背景 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        
        /* 漂浮粒子 */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            font-size: 16px;
            opacity: 0;
            animation: floatParticle 6s infinite;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        
        /* 歌曲标题 */
        .song-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
            margin-bottom: 40px;
            padding: 10px 20px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeInScale 0.8s ease 0.2s forwards;
        }
        
        @keyframes fadeInScale {
            to { opacity: 1; transform: scale(1); }
        }
        
        .song-badge::before,
        .song-badge::after {
            content: '♪';
            color: var(--gold);
        }
        
        /* 戒指 */
        .ring-wrapper {
            position: relative;
            margin-bottom: 50px;
        }
        
        .ring {
            font-size: 100px;
            display: inline-block;
            animation: heartbeat 1.8s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.5));
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.12); }
            30% { transform: scale(1); }
            45% { transform: scale(1.12); }
            60% { transform: scale(1); }
        }
        
        /* 光晕效果 */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulseGlow 2s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }
        
        /* 求婚文字 */
        .proposal-text {
            font-size: 28px;
            font-weight: 300;
            line-height: 2.2;
            color: #fff;
            margin-bottom: 50px;
        }
        
        .proposal-text .line {
            display: block;
            opacity: 0;
            transform: translateY(30px);
        }
        
        .proposal-text .line:nth-child(1) { animation: fadeUp 0.8s ease 0.6s forwards; }
        .proposal-text .line:nth-child(2) { animation: fadeUp 0.8s ease 1s forwards; }
        .proposal-text .line:nth-child(3) { animation: fadeUp 0.8s ease 1.4s forwards; }
        .proposal-text .line:nth-child(4) { animation: fadeUp 0.8s ease 1.8s forwards; }
        
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .proposal-text .highlight {
            font-size: 36px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 名字 */
        .names {
            font-size: 22px;
            color: var(--gold);
            letter-spacing: 8px;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 1s ease 2.5s forwards;
        }
        
        .names .heart {
            margin: 0 16px;
            color: #e74c3c;
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* 响应式 */
        @media (max-height: 700px) {
            .title { font-size: 56px; }
            .ring { font-size: 80px; }
            .proposal-text { font-size: 24px; }
            .proposal-text .highlight { font-size: 30px; }
        }
    </style>
</head>
<body>
    <!-- 第1页：山 -->
    <div class="page active" id="p1">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        <div class="content">
            <div class="year-tag">2022</div>
            <h1 class="title">山</h1>
            <div class="divider-line"></div>
            <div class="desc-card">
                <p class="desc-text">
                    我们在<span class="highlight">爬山</span>时相识<br>
                    <span class="highlight">张立伟</span> 与 <span class="highlight">和晨睿</span><br>
                    两年，一起爬过很多座山
                </p>
            </div>
        </div>
    </div>

    <!-- 第2页：星 -->
    <div class="page" id="p2">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        <div class="content">
            <div class="year-tag">第一次演唱会</div>
            <h1 class="title">星</h1>
            <div class="divider-line"></div>
            <div class="desc-card">
                <p class="desc-text">
                    你带我看第一场<span class="highlight">张杰</span><br>
                    我的第一次演唱会<br>
                    从此，音乐成为我们的一部分
                </p>
            </div>
        </div>
    </div>

    <!-- 第3页：雪 -->
    <div class="page" id="p3">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        <div class="content">
            <div class="year-tag">每一周</div>
            <h1 class="title">雪</h1>
            <div class="divider-line"></div>
            <div class="desc-card">
                <p class="desc-text">
                    你怕<span class="highlight">滑雪</span>，却每周陪我去<br>
                    从害怕到学会<br>
                    这就是陪伴的力量
                </p>
            </div>
        </div>
    </div>

    <!-- 第4页：求婚 -->
    <div class="page" id="proposal">
        <div class="stars" id="stars"></div>
        <div class="particles" id="particles"></div>
        
        <div class="proposal-content">
            <div class="song-badge">这就是爱</div>
            
            <div class="ring-wrapper">
                <div class="glow"></div>
                <div class="ring">💍</div>
            </div>
            
            <div class="proposal-text">
                <span class="line">山爬过了</span>
                <span class="line">雪滑过了</span>
                <span class="line">歌也听过了</span>
                <span class="line highlight">但我不想停</span>
            </div>
            
            <div class="names">
                和晨睿 <span class="heart">♥</span> 嫁给我
            </div>
        </div>
    </div>

    <!-- 页码指示器 -->
    <div class="page-indicator">
        <div class="indicator active" data-page="0"></div>
        <div class="indicator" data-page="1"></div>
        <div class="indicator" data-page="2"></div>
        <div class="indicator" data-page="3"></div>
    </div>

    <div class="hint">点击继续</div>

    <script>
        const pages = document.querySelectorAll('.page');
        const indicators = document.querySelectorAll('.indicator');
        const hint = document.querySelector('.hint');
        let currentPage = 0;
        let autoTimer = null;

        // 生成星星
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 60 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // 生成漂浮粒子
        function createParticles() {
            const container = document.getElementById('particles');
            const particles = ['✨', '💫', '⭐', '🌟'];
            
            setInterval(() => {
                if (currentPage !== 3) return;
                
                const p = document.createElement('span');
                p.className = 'particle';
                p.textContent = particles[Math.floor(Math.random() * particles.length)];
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (5 + Math.random() * 4) + 's';
                container.appendChild(p);
                
                setTimeout(() => p.remove(), 9000);
            }, 400);
        }

        // 切换页面
        function goToPage(index) {
            if (index < 0 || index >= pages.length) return;
            
            pages.forEach((page, i) => {
                page.classList.toggle('active', i === index);
            });
            
            indicators.forEach((ind, i) => {
                ind.classList.toggle('active', i === index);
            });
            
            currentPage = index;
            hint.style.display = index === 3 ? 'none' : 'block';
            
            // 重置自动播放
            clearTimeout(autoTimer);
            if (index < 3) {
                autoTimer = setTimeout(() => goToPage(index + 1), 5000);
            }
        }

        // 点击切换
        document.addEventListener('click', () => {
            if (currentPage < 3) goToPage(currentPage + 1);
        });

        // 滑动切换
        let touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            const diff = touchStartY - e.changedTouches[0].screenY;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentPage < 3) goToPage(currentPage + 1);
                else if (diff < 0 && currentPage > 0) goToPage(currentPage - 1);
            }
        }, {passive: true});

        // 初始化
        createStars();
        createParticles();
        autoTimer = setTimeout(() => goToPage(1), 5000);
    </script>
</body>
</html>
